services:
  app:
    image: ghcr.io/boxsubmus/spinda-app:latest
    volumes:
      - geoip_data:/var/www/html/var/geoip:ro
    depends_on:
      geoip-updater:
        condition: service_completed_successfully
      database:
        condition: service_started
    env_file:
      - .env.prod
    restart: unless-stopped

  assets:
    image: ghcr.io/boxsubmus/spinda-app:latest
    entrypoint: ["sh", "-c", "rm -rf /shared/* && cp -r /var/www/html/public/build/. /shared/"]
    volumes:
      - app_public_build:/shared
    restart: "no"

  webserver:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public_build:/var/www/html/public/build:ro
    depends_on:
      assets:
        condition: service_completed_successfully
      app:
        condition: service_started
    restart: unless-stopped

  database:
    image: mariadb:11
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  scheduler:
    image: ghcr.io/boxsubmus/spinda-app:latest
    command: php bin/console messenger:consume scheduler_default -vv
    volumes:
      - geoip_data:/var/www/html/var/geoip:ro
    depends_on:
      - app
      - database
    env_file:
      - .env.prod
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: database
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - database
    restart: unless-stopped

volumes:
  app_public_build:
  db_data: