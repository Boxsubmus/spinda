services:
  app:
    image: ghcr.io/boxsubmus/spinda-app:latest
    depends_on:
      - database
    env_file:
      - .env.prod
    restart: unless-stopped

  # Runs once per deploy: copies the freshly-built assets from the image
  # into a shared volume, then exits. webserver waits for this to finish.
  assets:
    image: ghcr.io/boxsubmus/spinda-app:latest
    entrypoint: ["sh", "-c", "rm -rf /shared/* && cp -r /var/www/html/public/build/. /shared/"]
    volumes:
      - app_public_build:/shared
    restart: "no"

  webserver:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public_build:/var/www/html/public/build:ro
    depends_on:
      assets:
        condition: service_completed_successfully
      app:
        condition: service_started
    restart: unless-stopped

  database:
    image: mariadb:11
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  scheduler:
    image: ghcr.io/boxsubmus/spinda-app:latest
    command: php bin/console messenger:consume scheduler_default -vv
    depends_on:
      - app
      - database
    env_file:
      - .env.prod
    restart: unless-stopped

volumes:
  app_public_build:
  db_data: