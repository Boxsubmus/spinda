services:
  app:
    image: ghcr.io/boxsubmus/spinda-app:latest
    depends_on:
      - database

  webserver:
    image: nginx:stable-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  database:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: spinda
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: