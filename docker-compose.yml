services:
  app:
    image: ghcr.io/boxsubmus/spinda-app:latest
    volumes:
      - geoip_data:/var/www/html/var/geoip:ro
    depends_on:
      - database

  geoip-updater:
    image: alpine:3.20
    command: sh -c "apk add --no-cache curl && curl -fL -o /data/GeoLite2-Country.mmdb https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-Country.mmdb"
    volumes:
      - geoip_data:/data
    restart: "no"

  webserver:
    image: nginx:stable-alpine
    depends_on:
      - app

  database:
    image: mariadb:11
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  geoip_data: